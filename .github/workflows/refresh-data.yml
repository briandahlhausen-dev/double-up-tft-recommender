name: Refresh comp + champion data

# Regenerates src/data/stats.ts (comp performance), src/data/champion-stats.ts
# (per-champion performance), src/data/unit-math.ts (theorycraft inputs from
# CommunityDragon, no key), src/data/ability-formulas.ts (Stage 3 exact per-cast
# damage), and src/data/theorycraft.ts (discovered boards) on a schedule, with no
# human in the loop, and commits the diff. The app stays 100% static — this runs
# in CI only. Requires a repo secret RIOT_API_KEY (a PRODUCTION key; a dev key
# expires every 24h and will start failing with 401/403). The Stage 3 Claude pass
# is OPTIONAL and auth'd EITHER way: CLAUDE_CODE_OAUTH_TOKEN (a Claude
# subscription token from `claude setup-token` — free against API credits,
# preferred) OR ANTHROPIC_API_KEY (metered). With neither, the committed seed
# formulas are kept. The two refreshes each run their own Double Up crawl, so the
# job makes two independent passes.

on:
  schedule:
    - cron: '0 12 * * 1' # Mondays 12:00 UTC
  workflow_dispatch:
    inputs:
      platform:
        description: Riot platform host (na1, euw1, kr…)
        default: na1
      seed_players:
        description: Double Up apex players to seed the snowball
        default: '100'
      max_boards:
        description: Max boards to collect
        default: '8000'
      max_requests:
        description: Hard cap on Riot API requests (safety bound)
        default: '20000'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    # Both are OPTIONAL — set EITHER as a repo secret to let the Stage 3 step
    # regenerate exact ability formulas via the offline Claude pass. The generator
    # prefers the subscription token (free) when present and only falls back to the
    # metered API key. Each resolves to '' when unset; with both empty the Stage 3
    # step is skipped (see its `if`). Neither is ever read client-side — the app
    # stays 100% static.
    #   • CLAUDE_CODE_OAUTH_TOKEN — Claude subscription token (`claude setup-token`).
    #   • ANTHROPIC_API_KEY       — metered Anthropic API key.
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Refresh comp stats
        env:
          RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
        run: |
          npm run refresh -- \
            --platform=${{ github.event.inputs.platform || 'na1' }} \
            --seed-players=${{ github.event.inputs.seed_players || '100' }} \
            --max-boards=${{ github.event.inputs.max_boards || '8000' }} \
            --max-requests=${{ github.event.inputs.max_requests || '20000' }}

      - name: Refresh champion stats
        env:
          RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
        run: |
          npm run refresh:champions -- \
            --platform=${{ github.event.inputs.platform || 'na1' }} \
            --seed-players=${{ github.event.inputs.seed_players || '100' }} \
            --max-boards=${{ github.event.inputs.max_boards || '8000' }} \
            --max-requests=${{ github.event.inputs.max_requests || '20000' }}

      - name: Build unit math (theorycraft inputs · keyless)
        run: npm run build:math

      - name: Build ability formulas (Stage 3 · exact per-cast damage)
        # The manual + authored seed runs keyless, but it's already committed, so
        # there's nothing to regenerate without auth — only the offline Claude pass
        # adds the remaining units. Skipped when BOTH the subscription token and the
        # API key are absent, so a keyless run can't overwrite Claude-enriched
        # formulas with the seed alone. When the subscription token is present the
        # generator shells out to the Claude Code CLI, so install it first.
        if: ${{ env.CLAUDE_CODE_OAUTH_TOKEN != '' || env.ANTHROPIC_API_KEY != '' }}
        run: |
          if [ -n "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "Stage 3: using the Claude subscription (CLI)."
            npm install -g @anthropic-ai/claude-code
          else
            echo "Stage 3: using the metered Anthropic API."
          fi
          npm run build:formulas

      - name: Discover high-synergy boards (theorycraft · keyless)
        # Runs AFTER formulas so board discovery uses the corrected ability damage.
        run: npm run build:theorycraft

      - name: Commit if changed
        run: |
          FILES="src/data/stats.ts src/data/augment-stats.ts src/data/champion-stats.ts src/data/unit-math.ts src/data/ability-formulas.ts src/data/theorycraft.ts"
          if [[ -n "$(git status --porcelain $FILES)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add $FILES
            git commit -m "chore(data): scheduled stats refresh"
            git push
          else
            echo "No data changes."
          fi
